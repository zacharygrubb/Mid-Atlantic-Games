{% extends 'base.html' %}

{% load static %}

{% block body %}
<div class="col-md-8 col-md-offset-2 col-sm-12 maincontent">
  <div class="detail_game_display">
    <img class="detail_game_img" src="{{ MEDIA_URL }}{{ game.cover_image }}">
    <span class="detail_game_title">{{ game.title }}</span>
    <span class="detail_game_genre">{{ game.genre }}</span>
    <div class="detail_game_description">{{ game.description }}</div>
  </div>
</div>
{% endblock %}
